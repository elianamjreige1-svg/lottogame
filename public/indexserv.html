<!DOCTYPE html>
<html>
<head>
<title>Lotto Admin</title>

<style>
body {
    font-family: Arial;
    background: #1e3c72;
    color: white;
    text-align: center;
}
table {
    margin: auto;
    background: white;
    color: black;
}
#logs {
    background: black;
    height: 200px;
    overflow-y: scroll;
    padding: 10px;
}
button {
    margin: 5px;
    padding: 8px;
}
</style>
</head>

<body>

<h1>🎯 Lotto Admin Panel</h1>

<h2>Add User</h2>
<input id="username" placeholder="Username">
<input id="password" placeholder="Password">
<input id="balance" placeholder="Balance">
<button onclick="addUser()">Add</button>

<h2>Users <input 
    id="searchUser" 
    placeholder="Search username..." 
    onkeyup="filterUsers()"
/></h2>
<table border="1" id="users"></table>

<h2>Game</h2>
<button onclick="startGame()">Start</button>
<button onclick="draw()">Draw</button>
<button onclick="again()">Play Again</button>
<h2>Results</h2>
<table border="1" id="results"></table>
<h2>Logs</h2>
<div id="logs"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// LOGS
socket.on("log", msg => {
    document.getElementById("logs").innerHTML += msg + "<br>";
});
let resultsData = [];
socket.on("result", (data) => {
    resultsData = data.results;
    renderResults();
});
let allUsers = [];
function renderUsers(data) {
    let html = "<tr><th>Username</th><th>Balance</th><th>Actions</th></tr>";

    data.forEach(u => {
        html += `
        <tr>
            <td><input id="name${u.username}" value="${u.username}"></td>
            <td><input id="bal${u.username}" value="${u.balance}"></td>
            <td>
                <button onclick="updateUser('${u.username}')">Update</button>
                <button onclick="deleteUser('${u.username}')">Delete</button>
            </td>
        </tr>`;
    });

    document.getElementById("users").innerHTML = html;
}
function filterUsers() {
    let value = document.getElementById("searchUser").value.toLowerCase();

    let filtered = allUsers.filter(u =>
        u.username.toLowerCase().includes(value)
    );

    renderUsers(filtered);
}
function renderResults() {
    let html = "<tr><th>Player</th><th>Numbers</th><th>Win</th></tr>";

    resultsData.forEach(r => {
        html += `
        <tr>
            <td>${r.userId}</td>
            <td>${r.numbers.join(", ")}</td>
            <td>${r.win}</td>
        </tr>`;
    });

    document.getElementById("results").innerHTML = html;
}

function loadUsers() {
    fetch("/users")
    .then(res => res.json())
    .then(data => {
        allUsers = data;
        renderUsers(data);
    });
}

function addUser() {
if(confirm("Are you sure you want to add this user?")){
    fetch("/users", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value,
            balance: balance.value
        })
    }).then(loadUsers);
	}
}

function updateUser(id) {
if(confirm("Are you sure you want to update this user?")){
    fetch("/users/"+id, {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            username: document.getElementById("name"+id).value,
            balance: document.getElementById("bal"+id).value
        })
    }).then(loadUsers);
	}
}

function deleteUser(id) {
if(confirm("Are you sure you want to delete this user?")){
    fetch("/users/"+id, {method:"DELETE"})
    .then(loadUsers);
	}
}

// GAME
function startGame() {
if(confirm("Are you sure to start the game?"))
    fetch("/start");
}

function draw() {
if(confirm("Are you sure you want to draw balls?")){
    fetch("/draw")
    .then(res => res.json())
	
   // .then(d => alert("Draw: " + d.draw.join(", ")));
   }
}

function again() {
if(confirm("Are you sure you want to play again?"))
    fetch("/again");
}

// INIT
loadUsers();



</script>
