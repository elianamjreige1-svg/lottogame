<!DOCTYPE html>
<html>
<head>
<title>Lotto Admin</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #1e3c72;
    color: white;
    text-align: center;
    margin: 0;
    padding: 10px;
}

/* Layout container */
.container {
    max-width: 1000px;
    margin: auto;
}

/* Inputs */
input {
    width: 90%;
    max-width: 300px;
    padding: 12px;
    margin: 5px 0;
    font-size: 16px;
    border-radius: 6px;
    border: none;
}

/* Buttons */
button {
    padding: 12px 16px;
    margin: 6px;
    font-size: 16px;
    border: none;
    border-radius: 6px;
    background: #4CAF50;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}

/* Tables responsive */
.table-container {
    overflow-x: auto;
}

table {
    width: 100%;
    min-width: 600px;
    margin: 10px auto;
    background: white;
    color: black;
    border-collapse: collapse;
}

th, td {
    padding: 8px;
    border: 1px solid #ccc;
}

input[type="text"], input[type="number"] {
    width: 100%;
}

/* Logs */
#logs {
    background: black;
    height: 200px;
    overflow-y: auto;
    padding: 10px;
    text-align: left;
    font-size: 14px;
    border-radius: 6px;
}

/* Section spacing */
section {
    margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎯 Lotto Admin Panel</h1>



<section>
<h2>Game</h2>
<button onclick="startGame()">Start</button>
<button onclick="draw()">Draw</button>
<button onclick="again()">Play Again</button>
</section>

<section>
<h2>Results</h2>
<div class="table-container">
<table id="results"></table>
</div>
</section>

<section>
<h2>Logs</h2>
<div id="logs"></div>
</section>

<section>
<h2>Add User</h2>
<input id="username" placeholder="Username">
<input id="password" placeholder="Password" type="password">
<input id="balance" placeholder="Balance" type="number">
<button onclick="addUser()">Add</button>
</section>

<section>
<h2>
Users 
<input id="searchUser" placeholder="Search username..." onkeyup="filterUsers()">
    <button id="refresh" onclick="refresh()">Refresh</button>
</h2>

<div class="table-container">
<table id="users"></table>
</div>
</section>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

// LOGS
socket.on("log", msg => {
    const logs = document.getElementById("logs");
    logs.innerHTML += msg + "<br>";
    logs.scrollTop = logs.scrollHeight;
});

let resultsData = [];
socket.on("result", (data) => {
    resultsData = data.results;
    renderResults();
});

let allUsers = [];
    
function refresh(){
loadUsers();
}
function renderUsers(data) {
    let html = "<tr><th>Username</th><th>Balance</th><th>Actions</th></tr>";

    data.forEach(u => {
        html += `
        <tr>
            <td><input id="name${u.username}" value="${u.username}"></td>
            <td><input id="bal${u.username}" value="${u.balance}" type="number"></td>
            <td>
                <button onclick="updateUser('${u.username}')">Update</button>
                <button onclick="deleteUser('${u.username}')">Delete</button>
            </td>
        </tr>`;
    });

    document.getElementById("users").innerHTML = html;
}

function filterUsers() {
    let value = document.getElementById("searchUser").value.toLowerCase();

    let filtered = allUsers.filter(u =>
        u.username.toLowerCase().includes(value)
    );

    renderUsers(filtered);
}

function renderResults() {
    let html = "<tr><th>Player</th><th>Numbers</th><th>Win</th></tr>";

    resultsData.forEach(r => {
        html += `
        <tr>
            <td>${r.userId}</td>
            <td>${r.numbers.join(", ")}</td>
            <td>${r.win}</td>
        </tr>`;
    });

    document.getElementById("results").innerHTML = html;
}

function loadUsers() {
    fetch("/users")
    .then(res => res.json())
    .then(data => {
        allUsers = data;
        renderUsers(data);
    });
}

function addUser() {
if(confirm("Are you sure you want to add this user?")){
    fetch("/users", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            username: username.value,
            password: password.value,
            balance: balance.value
        })
    }).then(loadUsers);
   document.getElementById("username").value="";
    document.getElementById("password").value="";
    document.getElementById("balance").value="";
    
}
}

function updateUser(id) {
if(confirm("Are you sure you want to update this user?")){
    fetch("/users/"+id, {
        method: "PUT",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({
            username: document.getElementById("name"+id).value,
            balance: document.getElementById("bal"+id).value
        })
    }).then(loadUsers);
}
}

function deleteUser(id) {
if(confirm("Are you sure you want to delete this user?")){
    fetch("/users/"+id, {method:"DELETE"})
    .then(loadUsers);
}
}

function startGame() {
if(confirm("Are you sure to start the game?"))
    fetch("/start");
}

function draw() {
if(confirm("Are you sure you want to draw balls?")){
    fetch("/draw").then(res => res.json());
}
}

function again() {
if(confirm("Are you sure you want to play again?"))
    fetch("/again");
}

loadUsers();
</script>

</body>
</html>
